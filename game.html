<body>
<header>
  <h1>Penrose Checkers</h1>
  <span id="status-bar">—</span>
  <span id="seed-display">Seed: <span id="seed-val"></span></span>

  <div id="settings-panel">

        <option value="3">~200 tiles</option>

</header>
<main>
  <div id="canvas-wrap">
    <canvas id="canvas"></canvas>
    <div id="win-banner">
      <h2 id="win-text"></h2>
      <button id="btn-play-again">Play Again</button>
    </div>
    <div id="setup-modal">
      <div id="setup-box">
        <h2>Penrose Checkers</h2>
        <p style="margin-bottom:14px;color:#aaa;font-size:0.85rem">Choose game mode:</p>
        <label><input type="radio" name="mode" value="2p" checked> Two Player (hot-seat)</label>
        <label><input type="radio" name="mode" value="ai"> vs AI (you play Gold)</label>
        <div class="btn-row">
          <button id="btn-start">Start Game</button>
        </div>
      </div>
    </div>
  </div>
  <div id="sidebar">
    <h2>Move Log</h2>
    <div id="log"></div>
  </div>
</main>

<script>
// ══════════════════════════════════════════════════════
//  Tiling — Penrose P2 via Robinson triangle deflation
// ══════════════════════════════════════════════════════
const PHI = (1 + Math.sqrt(5)) / 2;
function add(a,b){ return {x:a.x+b.x, y:a.y+b.y}; }
function sub(a,b){ return {x:a.x-b.x, y:a.y-b.y}; }
function scale(v,s){ return {x:v.x*s, y:v.y*s}; }

function deflate(tiles) {
  const next = [];
  for (const t of tiles) {
    const [A, B, C] = t.pts;
    if (t.type === 'kite') {
      // Acute half-kite (36-72-72): produces 1 kite + 1 dart.
      const P = add(A, scale(sub(B, A), 1/PHI));
      next.push({type:'kite', pts:[C, P, B]});
      next.push({type:'dart', pts:[P, C, A]});
    } else {
      // Obtuse half-dart (108-36-36): produces 2 darts + 1 kite.
      const Q = add(B, scale(sub(A, B), 1/PHI));
      const R = add(B, scale(sub(C, B), 1/PHI));
      next.push({type:'dart', pts:[R, C, A]});
      next.push({type:'dart', pts:[Q, R, B]});
      next.push({type:'kite', pts:[R, Q, A]});
    }
  }
  return next;
}

// Sun = 10 half-kite triangles. Adjacent pairs alternate B/C ordering
// so each pair subdivides toward their shared outer vertex.
function makeSun() {
  const tiles = [];
  for (let i = 0; i < 10; i++) {
    const a1 = i * 2 * Math.PI / 10;
    const a2 = (i + 1) * 2 * Math.PI / 10;
    let B = {x: Math.cos(a1), y: Math.sin(a1)};
    let C = {x: Math.cos(a2), y: Math.sin(a2)};
    if (i % 2 === 0) { const tmp = B; B = C; C = tmp; }
    tiles.push({type:'kite', pts:[{x:0,y:0}, B, C]});
  }
  return tiles;
}

function mergeTiling(halfTiles) {
  const EPS5 = 1e-5;
  function eKey(p,q) {
    const [a,b] = p.x < q.x || (Math.abs(p.x-q.x)<EPS5 && p.y<q.y) ? [p,q] : [q,p];
    return `${a.x.toFixed(5)},${a.y.toFixed(5)}|${b.x.toFixed(5)},${b.y.toFixed(5)}`;
  }
  const edgeMap = new Map();
  for (const t of halfTiles) {
    for (let i = 0; i < t.pts.length; i++) {
      const key = eKey(t.pts[i], t.pts[(i+1)%t.pts.length]);
      if (!edgeMap.has(key)) edgeMap.set(key, []);
      edgeMap.get(key).push({id: t.id, vi: i, vj: (i+1)%t.pts.length});
    }
  }
  const used = new Set();
  const result = [];
  for (const entries of edgeMap.values()) {
    if (entries.length !== 2) continue;
    const [e0, e1] = entries;
    const t0 = halfTiles[e0.id], t1 = halfTiles[e1.id];
    if (t0.type !== t1.type || used.has(t0.id) || used.has(t1.id)) continue;
    const u0i = 3 - e0.vi - e0.vj;
    const u1i = 3 - e1.vi - e1.vj;
    const u0 = t0.pts[u0i], u1 = t1.pts[u1i];
    const s0 = t0.pts[(u0i+1)%3], s1 = t0.pts[(u0i+2)%3];
    result.push({type: t0.type, pts: [u0, s0, u1, s1]});
    used.add(t0.id); used.add(t1.id);
  }
  for (const t of halfTiles) {
    if (!used.has(t.id)) result.push({type:t.type, pts:t.pts});
  }
  return result;
}

function generateTiling(iters) {
  let tiles = makeSun();
  for (let i = 0; i < iters; i++) tiles = deflate(tiles);
  tiles.forEach((t,i) => t.id = i);
  tiles = mergeTiling(tiles);
  tiles.forEach((t,i) => t.id = i);
  return tiles;
}

const EPS = 1e-6;
function buildGraph(tiles) {
  function edgeKey(p,q) {
    const [a,b] = p.x < q.x || (Math.abs(p.x-q.x)<EPS && p.y<q.y) ? [p,q] : [q,p];
    return `${a.x.toFixed(5)},${a.y.toFixed(5)}|${b.x.toFixed(5)},${b.y.toFixed(5)}`;
  }
  const edgeMap = new Map();
  for (const t of tiles) {
    const pts = t.pts;
    for (let i = 0; i < pts.length; i++) {
      const key = edgeKey(pts[i], pts[(i+1)%pts.length]);
      if (!edgeMap.has(key)) edgeMap.set(key, []);
      edgeMap.get(key).push(t.id);
    }
  }
  const adj = new Map();
  for (const t of tiles) adj.set(t.id, new Set());
  for (const ids of edgeMap.values()) {
    if (ids.length === 2) {
      adj.get(ids[0]).add(ids[1]);
      adj.get(ids[1]).add(ids[0]);
    }
  }
  return adj;
}

// ══════════════════════════════════════════════════════
//  Helpers
// ══════════════════════════════════════════════════════
function centroid(pts){ return {x:pts.reduce((s,p)=>s+p.x,0)/pts.length, y:pts.reduce((s,p)=>s+p.y,0)/pts.length}; }
// Ray-casting hit-test — works for triangles, quads, and concave polygons (darts).
function pointInPoly(px,py,pts) {
  let inside = false;
  for (let i=0, j=pts.length-1; i<pts.length; j=i++) {
    const xi=pts[i].x, yi=pts[i].y, xj=pts[j].x, yj=pts[j].y;
    if (((yi>py) !== (yj>py)) && (px < (xj-xi)*(py-yi)/(yj-yi)+xi)) inside = !inside;
  }
  return inside;
}
// Minimum distance from centroid to any edge — works as "inradius" for any polygon.
function tileRadius(pts) {
  const c = centroid(pts);
  let minD = Infinity;
  for (let i = 0; i < pts.length; i++) {
    const A=pts[i], B=pts[(i+1)%pts.length];
    const dx=B.x-A.x, dy=B.y-A.y, lenSq=dx*dx+dy*dy;
    if (lenSq < 1e-12) continue;
    const t = Math.max(0, Math.min(1, ((c.x-A.x)*dx+(c.y-A.y)*dy)/lenSq));
    minD = Math.min(minD, Math.hypot(c.x-A.x-t*dx, c.y-A.y-t*dy));
  }
  return isFinite(minD) ? minD : 0;
}

// ══════════════════════════════════════════════════════
//  Game state
// ══════════════════════════════════════════════════════
let canvas, ctx, tiles, adj, transform;
let pieces = [];
let currentTeam = 'A';
let selectedPieceId = null;
let reachable = new Set();
let gameMode = '2p';
let gameOver = false;
let aiThinking = false;
let tileOwnership = new Map();
let currentTurn = 1;
let deflateIters = 6;
let showGraph = false;
let piecesPerSide = 8;

// Build piece roster: ~half Scouts, ~quarter Soldiers, ~quarter Guards.
function makePieceTypes(n) {
  const scouts   = Math.max(1, Math.round(n * 0.5));
  const soldiers = Math.max(1, Math.round(n * 0.25));
  const guards   = Math.max(1, n - scouts - soldiers);
  const types = [];
  for (let i=0;i<scouts;i++)   types.push({type:'Scout',   steps:3});
  for (let i=0;i<soldiers;i++) types.push({type:'Soldier', steps:2});
  for (let i=0;i<guards;i++)   types.push({type:'Guard',   steps:1});
  return types;
}

function teamColor(team){ return team==='A' ? '#f0c040' : '#40c0c0'; }
function teamName(team){ return team==='A' ? 'Gold' : 'Teal'; }
function teamClass(team){ return team==='A' ? 'gold' : 'teal'; }

// ── Piece placement ───────────────────────────────────
function placePieces() {
  const tileList = tiles.filter(t => adj.get(t.id) && adj.get(t.id).size >= 1);
  const withCx = tileList.map(t => ({t, cx:centroid(t.pts).x}));
  withCx.sort((a,b)=>a.cx-b.cx);
  const n = withCx.length;
  const aPool = withCx.slice(0, Math.floor(n*0.25)).map(x=>x.t);
  const bPool = withCx.slice(Math.floor(n*0.75)).map(x=>x.t);

  function pickSpread(pool, count) {
    const step = Math.floor(pool.length / (count+1));
    const ids = [];
    for (let i=0;i<count;i++) ids.push(pool[step*(i+1)].id);
    return ids;
  }

  const pieceTypes = makePieceTypes(piecesPerSide);
  const aTiles = pickSpread(aPool, pieceTypes.length);
  const bTiles = pickSpread(bPool, pieceTypes.length);

  pieces = [];
  let pid = 0;
  pieceTypes.forEach((p,i) => {
    pieces.push({id:pid++, team:'A', type:p.type, steps:p.steps, tileId:aTiles[i], captured:false, captureFlash:0});
  });
  pieceTypes.forEach((p,i) => {
    pieces.push({id:pid++, team:'B', type:p.type, steps:p.steps, tileId:bTiles[i], captured:false, captureFlash:0});
  });
  tileOwnership.clear();
  currentTurn = 1;
}

// ── BFS reachable ─────────────────────────────────────
function getReachable(tileId, maxSteps) {
  const visited = new Map();
  visited.set(tileId, 0);
  const queue = [tileId];
  const result = new Set();
  while (queue.length) {
    const cur = queue.shift();
    const dist = visited.get(cur);
    if (dist >= maxSteps) continue;
    for (const nb of adj.get(cur)) {
      if (!visited.has(nb)) {
        visited.set(nb, dist+1);
        queue.push(nb);
        result.add(nb);
      }
    }
  }
  result.delete(tileId);
  return result;
}

// ── Move execution (collision capture: landing on an enemy removes it) ────────
function executeMove(piece, destTileId) {
  // Capture any enemy pieces already on the destination tile
  const captured = pieces.filter(q => !q.captured && q.team !== piece.team && q.tileId === destTileId);
  const captureDesc = [];
  for (const cp of captured) {
    cp.captured = true;
    cp.captureFlash = Date.now();
    captureDesc.push(`${teamName(cp.team)} ${cp.type}`);
  }

  piece.tileId = destTileId;
  tileOwnership.set(destTileId, {team: piece.team, turnSet: currentTurn});

  let entry = `T${currentTurn} · <span class="${teamClass(piece.team)}">${teamName(piece.team)} ${piece.type}</span> → #${destTileId}`;
  if (captureDesc.length) entry += `<br><span class="capture"> ✕ ${captureDesc.join(', ')}</span>`;
  logEntry(entry);

  for (const [tid, ow] of tileOwnership) {
    if (currentTurn - ow.turnSet > 5) tileOwnership.delete(tid);
  }
  currentTurn++;

  const aAlive = pieces.filter(p=>!p.captured&&p.team==='A').length;
  const bAlive = pieces.filter(p=>!p.captured&&p.team==='B').length;
  if (aAlive===0||bAlive===0) {
    setTimeout(()=>showWin(aAlive===0?'B':'A'), 300);
    gameOver = true;
  }
  return captured.length;
}

function showWin(team) {
  const banner = document.getElementById('win-banner');
  banner.className = 'show ' + (team==='A'?'gold-win':'teal-win');
  document.getElementById('win-text').textContent = teamName(team) + ' Wins!';
}

// ── AI ────────────────────────────────────────────────
function evalMove(piece, destId) {
  const origTile = piece.tileId;
  // Immediate captures: enemies sitting on destination
  const capEnemy = pieces.filter(q => !q.captured && q.team !== piece.team && q.tileId === destId).length;
  // Simulate move to evaluate resulting board
  piece.tileId = destId;
  // Pieces of ours adjacent to an enemy (threatened — enemy can land on us next turn)
  const ownVuln = pieces.filter(p=>!p.captured&&p.team==='B').filter(p=>{
    const nb=adj.get(p.tileId); if(!nb) return false;
    return [...nb].some(nid=>pieces.find(q=>!q.captured&&q.team==='A'&&q.tileId===nid));
  }).length;
  // Enemy pieces adjacent to one of ours (we can threaten them next turn)
  const enVuln = pieces.filter(p=>!p.captured&&p.team==='A').filter(p=>{
    const nb=adj.get(p.tileId); if(!nb) return false;
    return [...nb].some(nid=>pieces.find(q=>!q.captured&&q.team==='B'&&q.tileId===nid));
  }).length;
  piece.tileId = origTile;
  return {capEnemy, ownVuln, enVuln};
}

function aiTurn() {
  const myPieces = pieces.filter(p=>!p.captured&&p.team==='B');
  let best = null, bestScore = null;
  for (const p of myPieces) {
    const reach = getReachable(p.tileId, p.steps);
    for (const dest of reach) {
      const sc = evalMove(p, dest);
      if (!bestScore ||
          sc.capEnemy > bestScore.capEnemy ||
          (sc.capEnemy===bestScore.capEnemy && sc.ownVuln < bestScore.ownVuln) ||
          (sc.capEnemy===bestScore.capEnemy && sc.ownVuln===bestScore.ownVuln && sc.enVuln > bestScore.enVuln)) {
        best = {piece:p, dest};
        bestScore = sc;
      }
    }
  }
  if (best) {
    executeMove(best.piece, best.dest);
    currentTeam = 'A';
    selectedPieceId = null;
    reachable = new Set();
    aiThinking = false;
    updateStatus();
    drawBoard();
  }
}

// ── Input handling ────────────────────────────────────
function handleClick(sx, sy) {
  if (gameOver || aiThinking) return;
  if (gameMode === 'ai' && currentTeam === 'B') return;

  const wp = screenToWorld({x:sx,y:sy});
  let clickedTile = null;
  for (let i=tiles.length-1;i>=0;i--) {
    if (pointInPoly(wp.x,wp.y,tiles[i].pts)) { clickedTile=tiles[i]; break; }
  }
  if (!clickedTile) return;
  const tid = clickedTile.id;

  if (selectedPieceId !== null && reachable.has(tid)) {
    const p = pieces.find(q=>q.id===selectedPieceId);
    executeMove(p, tid);
    selectedPieceId = null;
    reachable = new Set();
    if (!gameOver) {
      currentTeam = currentTeam==='A'?'B':'A';
      updateStatus();
      if (gameMode==='ai' && currentTeam==='B') {
        aiThinking = true;
        setTimeout(aiTurn, 600);
      }
    }
    drawBoard();
    return;
  }

  const clicked = pieces.find(p=>!p.captured&&p.tileId===tid&&p.team===currentTeam);
  if (clicked) {
    selectedPieceId = clicked.id;
    reachable = getReachable(tid, clicked.steps);
    drawBoard();
    return;
  }

  selectedPieceId = null;
  reachable = new Set();
  drawBoard();
}

// ── Drawing ───────────────────────────────────────────
function computeTransform(W,H) {
  let minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity;
  for (const t of tiles) for (const p of t.pts) {
    minX=Math.min(minX,p.x); maxX=Math.max(maxX,p.x);
    minY=Math.min(minY,p.y); maxY=Math.max(maxY,p.y);
  }
  const pad=30, sx=(W-2*pad)/(maxX-minX), sy=(H-2*pad)/(maxY-minY);
  const s=Math.min(sx,sy);
  return {s, ox:pad+((W-2*pad)-(maxX-minX)*s)/2-minX*s,
             oy:pad+((H-2*pad)-(maxY-minY)*s)/2-minY*s};
}
function worldToScreen(p){ return {x:p.x*transform.s+transform.ox, y:p.y*transform.s+transform.oy}; }
function screenToWorld(p){ return {x:(p.x-transform.ox)/transform.s, y:(p.y-transform.oy)/transform.s}; }

function tileBaseFill(t) {
  const ow = tileOwnership.get(t.id);
  if (!ow) return t.type==='kite'?'#2d4a7a':'#3d2a5a';
  const base = t.type==='kite'?[45,74,122]:[61,42,90];
  const tint = ow.team==='A'?[240,192,64]:[64,192,192];
  const a=0.25;
  return `rgb(${Math.round(base[0]*(1-a)+tint[0]*a)},${Math.round(base[1]*(1-a)+tint[1]*a)},${Math.round(base[2]*(1-a)+tint[2]*a)})`;
}

function drawBoard() {
  const W=canvas.width, H=canvas.height;
  ctx.clearRect(0,0,W,H);

  const selPiece = selectedPieceId!==null ? pieces.find(p=>p.id===selectedPieceId) : null;

  // Draw tiles
  for (const t of tiles) {
    const pts = t.pts.map(worldToScreen);
    ctx.beginPath();
    ctx.moveTo(pts[0].x,pts[0].y);
    for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i].x,pts[i].y);
    ctx.closePath();

    if (selPiece && t.id===selPiece.tileId) {
      ctx.fillStyle='#e94560';
    } else if (reachable.has(t.id)) {
      // Vivid green-yellow highlight for reachable destinations
      ctx.fillStyle='rgba(140,255,60,0.72)';
    } else {
      ctx.fillStyle=tileBaseFill(t);
    }
    ctx.fill();
    ctx.strokeStyle=t.type==='kite'?'#4a7ab5':'#7a4ab5';
    ctx.lineWidth=0.5;
    ctx.stroke();
  }

  // Draw additional bright border on reachable tiles so they pop on small tiles
  if (reachable.size > 0) {
    ctx.strokeStyle='rgba(160,255,80,0.9)';
    ctx.lineWidth=1.5;
    for (const rid of reachable) {
      const t = tiles[rid];
      if (!t) continue;
      const pts = t.pts.map(worldToScreen);
      ctx.beginPath();
      ctx.moveTo(pts[0].x,pts[0].y);
      for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i].x,pts[i].y);
      ctx.closePath();
      ctx.stroke();
    }
  }

  // Draw adjacency graph overlay
  if (showGraph) {
    const drawn = new Set();
    ctx.strokeStyle = 'rgba(255,255,255,0.18)';
    ctx.lineWidth = 0.7;
    ctx.beginPath();
    for (const t of tiles) {
      const cA = centroid(t.pts.map(worldToScreen));
      for (const nid of adj.get(t.id)) {
        const key = t.id < nid ? t.id*1000000+nid : nid*1000000+t.id;
        if (drawn.has(key)) continue;
        drawn.add(key);
        const nt = tiles[nid];
        const cB = centroid(nt.pts.map(worldToScreen));
        ctx.moveTo(cA.x, cA.y);
        ctx.lineTo(cB.x, cB.y);
      }
    }
    ctx.stroke();
    // Node dots
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    for (const t of tiles) {
      const c = centroid(t.pts.map(worldToScreen));
      ctx.beginPath();
      ctx.arc(c.x, c.y, 1.4, 0, 2*Math.PI);
      ctx.fill();
    }
  }

  // Draw pieces — radius = 60% of tile's inscribed circle radius
  const now = Date.now();
  for (const p of pieces) {
    if (p.captured) {
      const elapsed = now - p.captureFlash;
      if (elapsed < 400) {
        const sc = tiles[p.tileId];
        if (!sc) continue;
        const spts = sc.pts.map(worldToScreen);
        const r = Math.max(2, tileRadius(spts) * 0.6);
        ctx.globalAlpha = 1 - elapsed/400;
        drawPiece(ctx, p, centroid(spts), r);
        ctx.globalAlpha = 1;
      }
      continue;
    }
    const t = tiles[p.tileId];
    if (!t) continue;
    const spts = t.pts.map(worldToScreen);
    drawPiece(ctx, p, centroid(spts), Math.max(2, tileRadius(spts) * 0.6));
  }

  if (pieces.some(p=>p.captured && (now-p.captureFlash)<400)) {
    requestAnimationFrame(drawBoard);
  }
}

function drawPiece(ctx, p, pos, r) {
  ctx.beginPath();
  ctx.arc(pos.x, pos.y, r, 0, 2*Math.PI);
  ctx.fillStyle = teamColor(p.team);
  ctx.fill();
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.fillStyle='#111';
  ctx.font = `bold ${Math.max(5, Math.min(r*1.1, 14))}px monospace`;
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText(p.type==='Scout'?'S':p.type==='Soldier'?'K':'G', pos.x, pos.y);
}

function logEntry(html) {
  const log = document.getElementById('log');
  const div = document.createElement('div');
  div.innerHTML = html;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

function updateStatus() {
  const aCount = pieces.filter(p=>!p.captured&&p.team==='A').length;
  const bCount = pieces.filter(p=>!p.captured&&p.team==='B').length;
  document.getElementById('status-bar').innerHTML =
    `<span class="${teamClass(currentTeam)}">${teamName(currentTeam)}'s turn</span> &nbsp;|&nbsp; ` +
    `<span class="gold">Gold: ${aCount}</span> &nbsp; <span class="teal">Teal: ${bCount}</span>`;
}

// ── Init ──────────────────────────────────────────────
function initGame(seed) {
  document.getElementById('seed-val').textContent = seed;
  window.location.hash = 'seed='+seed;
  tiles = generateTiling(deflateIters);
  adj = buildGraph(tiles);
  const wrap = document.getElementById('canvas-wrap');
  canvas.width = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  transform = computeTransform(canvas.width, canvas.height);
  placePieces();
  currentTeam='A'; selectedPieceId=null; reachable=new Set();
  gameOver=false; aiThinking=false;
  document.getElementById('log').innerHTML='';
  document.getElementById('win-banner').className='';
  updateStatus();
  drawBoard();
}

function resize() {
  if (!tiles) return;
  const wrap = document.getElementById('canvas-wrap');
  canvas.width = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  transform = computeTransform(canvas.width, canvas.height);
  drawBoard();
}

window.addEventListener('load', () => {
  canvas = document.getElementById('canvas');
  ctx = canvas.getContext('2d');
  window.addEventListener('resize', resize);

  canvas.addEventListener('click', e => {
    const rect = canvas.getBoundingClientRect();
    handleClick(
      (e.clientX-rect.left)*canvas.width/rect.width,
      (e.clientY-rect.top)*canvas.height/rect.height
    );
  });

  // Setup modal
  document.getElementById('btn-start').addEventListener('click', () => {
    gameMode = document.querySelector('input[name=mode]:checked').value;
    document.getElementById('setup-modal').style.display='none';
    const hash=window.location.hash.replace('#','');
    const m=hash.match(/seed=([^&]+)/);
    const seed = m ? decodeURIComponent(m[1]) : Math.random().toString(36).slice(2,8);
    initGame(seed);
  });

  document.getElementById('btn-new-seed').addEventListener('click', () => {
    initGame(Math.random().toString(36).slice(2,8));
  });

  document.getElementById('btn-play-again').addEventListener('click', () => {
    const seed = document.getElementById('seed-val').textContent;
    document.getElementById('log').innerHTML='';
    tiles = generateTiling(deflateIters);
    adj = buildGraph(tiles);
    placePieces();
    currentTeam='A'; selectedPieceId=null; reachable=new Set();
    gameOver=false; aiThinking=false;
    document.getElementById('win-banner').className='';
    updateStatus();
    drawBoard();
  });

  // Settings panel toggle
  const settingsPanel = document.getElementById('settings-panel');
  document.getElementById('btn-settings').addEventListener('click', e => {
    e.stopPropagation();
    settingsPanel.classList.toggle('open');
  });
  document.addEventListener('click', e => {
    if (!settingsPanel.contains(e.target) && e.target.id !== 'btn-settings') {
      settingsPanel.classList.remove('open');
    }
  });

  // Tile density and piece count (take effect on next new game)
  document.getElementById('sel-iters').addEventListener('change', e => {
    deflateIters = parseInt(e.target.value);
  });
  document.getElementById('sel-pieces').addEventListener('change', e => {
    piecesPerSide = parseInt(e.target.value);
  });

  // Graph overlay toggle (instant)
  document.getElementById('chk-graph').addEventListener('change', e => {
    showGraph = e.target.checked;
    if (tiles) drawBoard();
  });
});
</script>
</body>
</html>
